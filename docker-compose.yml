services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calendar-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Europe/Rome
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - wwebjs-auth:/app/.wwebjs_auth
      - wwebjs-cache:/app/.wwebjs_cache
    networks:
      - calendar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calendar-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - calendar-net

volumes:
  wwebjs-auth:
  wwebjs-cache:

networks:
  calendar-net:
    driver: bridge
